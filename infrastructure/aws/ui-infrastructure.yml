# aws cloudformation deploy --template-file ui-infrastructure.yml --stack-name llmc-ui-nonprod --parameter-overrides AppName=llmcouncil HostedZoneId=Z01154663FWOKL53MVLSI Environment=nonprod --capabilities CAPABILITY_NAMED_IAM
AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Creates the infrastructure to host and expose a Single Page Application (SPA) using AWS services.:
      - An Amazon S3 bucket for hosting the application.
      - An Amazon CloudFront distribution to expose the application and the API.
      - AWS WAF for IP restriction, Ocelot IP filtering.
      - IAM Role for GitHub Actions OIDC.

Parameters:
  AppName:
    Description: The name of the application.
    Type: String
  HostedZoneId:
    Type: String
  Environment:
    Type: String
    AllowedValues:
      - nonprod
      - prod

Conditions:
  IsProduction: !Equals [!Ref Environment, 'prod']

Resources:
  # The Amazon S3 bucket into which our Single Page Application build files must be deployed
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${AppName}-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'

  # The Amazon S3 bucket policy for securing the bucket hosting the application
  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      PolicyDocument:
        Id: MyPolicy
        Version: 2012-10-17
        Statement:
          - Sid: PolicyForCloudFrontPrivateContent
            Effect: Allow
            Resource: !Sub ${S3Bucket.Arn}/*
            Principal:
              Service: cloudfront.amazonaws.com
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CFDistributionSPA}
            Action: 's3:GetObject*'
      Bucket: !Ref S3Bucket

  # The Amazon CloudFront distribution exposing our Single Page Application
  # Policies can be found here: https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/using-managed-response-headers-policies.html
  CFDistributionSPA:
    Type: 'AWS::CloudFront::Distribution'
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt S3Bucket.RegionalDomainName
            Id: myS3Origin
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
        WebACLId: !GetAtt MyWebACL.Arn
        Enabled: true
        Comment: !Sub '${AppName}-${Environment}'
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          TargetOriginId: myS3Origin
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
          ResponseHeadersPolicyId: eaab4381-ed33-4a86-88ca-d9558dc6cd63 # CORS-with-preflight-and-SecurityHeadersPolicy
          ViewerProtocolPolicy: redirect-to-https
        CacheBehaviors:
          # Cache static assets normally
          - PathPattern: "*.css"
            TargetOriginId: myS3Origin
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
          - PathPattern: "*.js"
            TargetOriginId: myS3Origin
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
          - PathPattern: "*.png"
            TargetOriginId: myS3Origin
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
          - PathPattern: "*.jpg"
            TargetOriginId: myS3Origin
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
          - PathPattern: "*.ico"
            TargetOriginId: myS3Origin
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
        CustomErrorResponses:
          - ErrorCode: 404
            ErrorCachingMinTTL: 0
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_All
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificate
          SslSupportMethod: 'sni-only'
          MinimumProtocolVersion: 'TLSv1.2_2021'

  AcmCertificate:
    Type: 'AWS::CertificateManager::Certificate'
    Properties:
      DomainName: !Sub '${Environment}.cloudfront.${AWS::AccountId}.cloud.bayer.com'
      DomainValidationOptions:
        - HostedZoneId: !Sub ${HostedZoneId}
          DomainName: !Sub '${Environment}.cloudfront.${AWS::AccountId}.cloud.bayer.com'
      ValidationMethod: 'DNS'

  # The Amazon CloudFront origin access control
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    DependsOn:
      - S3Bucket
    Properties:
      OriginAccessControlConfig:
        Description: Default Origin Access Control
        Name: !Ref AWS::StackName
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # AWS WAF WebACL for IP filtering
  # TEMPORARY: Allowing all IPs. To restore IP restriction, swap the DefaultAction block below.
  MyWebACL:
    Type: 'AWS::WAFv2::WebACL'
    Properties:
      Name: !Sub '${AppName}-${Environment}-waf'
      Scope: CLOUDFRONT
      Description: !Sub 'WebACL to protect ${AppName} ${Environment} resources'
      DefaultAction:
        Allow: {}
      # --- Original IP-restricted setup (uncomment this, comment out Allow above to restore): ---
      # DefaultAction:
      #   Block: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${AppName}-${Environment}-waf-metric'
      Rules:
        - Name: !Sub '${Environment}-ip-rule'
          Priority: 0
          Action:
            Allow: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${Environment}-allowed-ips'
          Statement:
            IPSetReferenceStatement:
              Arn: !GetAtt AllowedIPSet.Arn
              
  # IP Set for the current environment (used when IP restriction is enabled in MyWebACL)
  AllowedIPSet:
    Type: 'AWS::WAFv2::IPSet'
    Properties:
      Name: !Sub '${AppName}-${Environment}-ip-set'
      Description: !Sub 'Allowed IPs for ${Environment} environment'
      Scope: CLOUDFRONT
      IPAddressVersion: IPV4
      Addresses: !If
        - IsProduction
        - # Production IPs
          - '54.197.243.97/32'
          - '54.144.51.241/32'
          - '52.54.251.24/32'
          - '35.170.157.237/32'
          - '18.205.134.102/32'
          - '52.44.248.252/32'
        - # Non-Production IPs (dev and nonprod)
          - '54.197.243.97/32'
          - '54.144.51.241/32'
          - '35.172.20.83/32'
          - '52.204.86.167/32'
          - '18.205.241.131/32'
          - '34.237.193.54/32'

