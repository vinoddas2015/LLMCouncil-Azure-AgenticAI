# ============================================================
# LLM Council MGA — Docker Compose (Cloud-Agnostic)
# ============================================================
# Profiles:
#   default  – local JSON storage (dev / small-scale)
#   redis    – Redis-backed memory store (production)
# ============================================================

services:
  # ---- Backend API + serves static frontend ----
  council:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8001}:8001"
    environment:
      - PORT=8001
      - HOST=0.0.0.0
      - MEMORY_BACKEND=${MEMORY_BACKEND:-local}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATA_DIR=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Pass through API credentials
      - API_KEY=${API_KEY:-}
      - API_BASE_URL=${API_BASE_URL:-https://chat.int.bayer.com/api/v2/chat/completions}
    volumes:
      - council-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - council-net

  # ---- Redis (optional, activate with MEMORY_BACKEND=redis) ----
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - redis
    networks:
      - council-net

volumes:
  council-data:
    driver: local
  redis-data:
    driver: local

networks:
  council-net:
    driver: bridge
